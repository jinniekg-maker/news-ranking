<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wealth Report — Daily Financial Insight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0b0d;
            --bg-secondary: #14161a;
            --accent-gold: #c5a059;
            --accent-gold-light: #e2c28d;
            --text-primary: #f2f2f2;
            --text-secondary: #a0a0a0;
            --border-color: rgba(197, 160, 89, 0.2);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 고급스러운 배경 효과 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(197, 160, 89, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        /* Typography */
        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Header */
        header {
            padding: 80px 20px 40px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 14px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-weight: 600;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
        }

        .date-line {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* Ticker - 세련된 스타일 */
        .ticker-container {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            overflow: hidden;
        }

        .ticker-wrap {
            display: flex;
            white-space: nowrap;
            animation: ticker 40s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            padding: 0 40px;
            font-size: 13px;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
        }

        .ticker-item strong {
            color: var(--accent-gold);
            margin-right: 10px;
        }

        /* Filter */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 1px solid transparent;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            color: var(--accent-gold);
            border-bottom: 1px solid var(--accent-gold);
        }

        /* Ranking Grid */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .ranking-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .rank-card {
            display: grid;
            grid-template-columns: 80px 1fr 200px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 40px;
            position: relative;
            transition: var(--transition);
            cursor: pointer;
        }

        .rank-card:hover {
            border-color: var(--border-color);
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
        }

        .rank-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--accent-gold);
            opacity: 0.5;
        }

        .card-content h2 {
            font-size: 28px;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .card-meta {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-gold);
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
        }

        .card-summary {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 20px;
            max-width: 90%;
        }

        .card-stats {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            text-align: right;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 30px;
        }

        .score-value {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        /* Detail Section */
        .card-detail {
            grid-column: 1 / -1;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card-detail.open {
            max-height: 800px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .detail-section h4 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-gold);
            margin-bottom: 15px;
        }

        .detail-section p, .detail-section li {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .key-list {
            list-style: none;
        }

        .key-list li::before {
            content: "—";
            margin-right: 10px;
            color: var(--accent-gold);
        }

        /* Chart Section */
        .analysis-section {
            margin-top: 100px;
            padding: 60px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .analysis-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .analysis-header h3 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .chart-container {
            height: 400px;
            position: relative;
        }

        /* Footer */
        footer {
            margin-top: 100px;
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .rank-card {
                grid-template-columns: 1fr;
                padding: 30px;
            }
            .rank-number { margin-bottom: 10px; }
            .card-stats {
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                padding-left: 0;
                padding-top: 20px;
                align-items: flex-start;
                text-align: left;
            }
            .detail-grid { grid-template-columns: 1fr; }
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="ticker-container">
        <div class="ticker-wrap" id="ticker">
            <!-- Ticker items will be injected -->
        </div>
    </div>

    <header class="fade-in">
        <div class="logo">Exclusive Intelligence</div>
        <h1>The Wealth Report</h1>
        <div class="date-line" id="today-date">April 30, 2026</div>
    </header>

    <nav class="filter-nav fade-in">
        <button class="filter-btn active" onclick="filterRankings('all')">전체 리포트</button>
        <button class="filter-btn" onclick="filterRankings('economy')">금융 & 시장</button>
        <button class="filter-btn" onclick="filterRankings('policy')">정책 & 규제</button>
        <button class="filter-btn" onclick="filterRankings('tech')">미래 기술</button>
    </nav>

    <main>
        <div class="ranking-container" id="ranking-list">
            <!-- Ranking cards will be injected -->
        </div>

        <section class="analysis-section fade-in">
            <div class="analysis-header">
                <h3>Market Sentiment Analysis</h3>
                <p class="serif" style="color: var(--text-secondary); font-style: italic;">주요 경제 지표 및 이슈 관심도 분석</p>
            </div>
            <div class="chart-container">
                <canvas id="wealthChart"></canvas>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-logo">The Wealth Report</div>
        <p>© 2026 Premium Financial Insight. All rights reserved.</p>
        <p style="margin-top: 10px; letter-spacing: 0.1em;">데이터는 매일 자정에 자동으로 갱신됩니다.</p>
    </footer>

    <script>
        // 뉴스 데이터 (경제 중심 순위)
        const newsData = [
            {
                rank: 1,
                category: "economy",
                categoryLabel: "금융 & 시장",
                title: "코스피 사상 최고가 경신 — 빅테크 AI 투자 열풍에 6750선 터치",
                summary: "글로벌 빅테크 기업들의 인공지능(AI) 설비 투자 확대 소식에 힘입어 국내 증시가 장중 사상 최고치를 경신했습니다. 삼성전자와 SK하이닉스를 중심으로 외국인 매수세가 집중되며 시장의 자금 흐름이 IT 기술주로 쏠리고 있습니다.",
                score: 98,
                detail: {
                    background: "미국 빅테크들의 호실적과 AI 투자 지속 의지가 확인되면서 아시아 증시 전반에 훈풍이 불고 있습니다. 특히 반도체 공급망의 핵심인 한국 시장에 대한 재평가가 이루어지고 있는 시점입니다.",
                    keyPoints: [
                        "코스피 6750선 돌파, 장중 최고가 경신",
                        "외국인 및 기관 동반 순매수 유입",
                        "AI 반도체 밸류체인 기업 주가 급등",
                        "유가 상승 및 금리 인하 지연 우려가 잠재적 리스크로 상존"
                    ]
                }
            },
            {
                rank: 2,
                category: "economy",
                categoryLabel: "정책 & 경제",
                title: "美 FOMC 금리 동결 — 韓 금융당국 '외환시장 변동성' 밀착 모니터링",
                summary: "미국 연준(Fed)이 기준금리를 3.75%로 동결하며 고금리 기조를 유지함에 따라 달러/원 환율이 1,480원대를 위협하고 있습니다. 정부는 경제·금융 수장 회의를 소집해 시장 안정화 대책을 논의했습니다.",
                score: 94,
                detail: {
                    background: "미국의 금리 인하 기대감이 후퇴하면서 한미 금리차에 따른 자본 유출 우려가 커지고 있습니다. 기획재정부와 한국은행은 환율 변동성에 대응하기 위한 가용 수단을 점검하고 있습니다.",
                    keyPoints: [
                        "미국 기준금리 3.75% 동결 결정",
                        "달러/원 환율 1,480~1,490원대 전망",
                        "경제·금융 수장 '거시경제금융회의' 개최",
                        "수출 기업 채산성 악화 방지 대책 마련"
                    ]
                }
            },
            {
                rank: 3,
                category: "economy",
                categoryLabel: "금융 서비스",
                title: "생활 밀착형 금융 플랫폼 경쟁 가속 — KB·신한 등 대형 금융지주 '슈퍼앱' 승부수",
                summary: "전통 금융권이 빅테크에 맞서 결제, 투자, 생활 서비스를 통합한 '슈퍼앱' 전략을 강화하고 있습니다. 소비 데이터 분석을 통한 맞춤형 자산 관리 서비스가 금융권의 새로운 수익 모델로 부상하고 있습니다.",
                score: 89,
                detail: {
                    background: "단순 뱅킹을 넘어 쇼핑, 여행, 건강관리까지 아우르는 금융 플랫폼 생태계 구축이 활발합니다. 고객 데이터를 얼마나 정교하게 활용하느냐가 미래 경쟁력의 핵심이 되고 있습니다.",
                    keyPoints: [
                        "KB국민은행·신한은행 등 슈퍼앱 고도화 경쟁",
                        "AI 기반 맞춤형 자산관리(Wealth Management) 강화",
                        "5월 가정의 달 맞이 소비 데이터 기반 프로모션 확대",
                        "비금융 데이터 연계 마이데이터 서비스 차별화"
                    ]
                }
            },
            {
                rank: 4,
                category: "policy",
                categoryLabel: "정책 & 규제",
                title: "트럼프 관세 리스크 장기화 — 글로벌 공급망 '에너지-식량' 안보 비상",
                summary: "미국 대법원의 일부 관세 무효 판결에도 불구하고 트럼프 행정부의 보호무역 기조가 강화되면서 글로벌 교역 증가율이 둔화될 것으로 보입니다. 특히 에너지와 식량 자원의 공급망 재편이 경제의 핵심 변수로 떠올랐습니다.",
                score: 85,
                detail: {
                    background: "무역법 301조를 활용한 관세 압박이 지속되면서 한국 수출 기업들의 불확실성이 커지고 있습니다. 에너지 수입 의존도가 높은 한국 경제에 유가 상승은 물가 압박의 주된 원인이 됩니다.",
                    keyPoints: [
                        "UN, 글로벌 교역 증가율 전망치 2.2%로 하향",
                        "에너지·식량 공급망 '냉전적' 대립 구도 형성",
                        "국내 정유 및 화학 업계 원가 부담 가중",
                        "공급망 다변화를 위한 정부 차원의 자원 외교 강화"
                    ]
                }
            },
            {
                rank: 5,
                category: "tech",
                categoryLabel: "미래 기술",
                title: "스탠퍼드 AI 인덱스 2026 — 한국, AI 모델 경쟁력 세계 상위권 안착",
                summary: "한국이 개발한 AI 모델 수가 당초 예상보다 많은 8개로 확인되며 기술 경쟁력을 입증했습니다. 하지만 기술 발전에 따른 일자리 감소 우려와 AI 보안 이슈가 새로운 사회적 과제로 부각되고 있습니다.",
                score: 81,
                detail: {
                    background: "2026 월드 IT 쇼에서 확인된 것처럼 AI는 이제 실험실을 벗어나 산업 현장의 핵심 인프라로 자리 잡았습니다. 보안 플랫폼과 AI 윤리에 대한 투자가 병행되어야 하는 시점입니다.",
                    keyPoints: [
                        "한국형 AI 모델 8개 등재 (스탠퍼드 보고서)",
                        "AI 보안 플랫폼 '시큐어AI' 등 기술 보안 수요 급증",
                        "인력 구조조정과 AI 투자 확대의 역설적 공존",
                        "교육 및 의료 분야 AI 임베디드 인프라 전환 가속"
                    ]
                }
            }
        ];

        // 날짜 설정
        function setDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('ko-KR', options);
        }

        // 티커 설정
        function buildTicker() {
            const ticker = document.getElementById('ticker');
            const items = newsData.map(n => `<div class="ticker-item"><strong>${n.rank}위</strong> ${n.title}</div>`);
            ticker.innerHTML = items.join('') + items.join(''); // 무한 루프를 위해 복제
        }

        // 카드 렌더링
        function renderRankings(filter = 'all') {
            const list = document.getElementById('ranking-list');
            const filtered = filter === 'all' ? newsData : newsData.filter(n => n.category === filter);
            
            list.innerHTML = filtered.map((n, index) => `
                <div class="rank-card fade-in" style="animation-delay: ${index * 0.1}s" onclick="toggleDetail(this)">
                    <div class="rank-number">${n.rank}</div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span>${n.categoryLabel}</span>
                            <span>April 30, 2026</span>
                        </div>
                        <h2>${n.title}</h2>
                        <p class="card-summary">${n.summary}</p>
                    </div>
                    <div class="card-stats">
                        <div class="score-label">Impact Score</div>
                        <div class="score-value">${n.score}</div>
                    </div>
                    <div class="card-detail">
                        <div class="detail-grid">
                            <div class="detail-section">
                                <h4>인사이트 배경</h4>
                                <p>${n.detail.background}</p>
                            </div>
                            <div class="detail-section">
                                <h4>핵심 포인트</h4>
                                <ul class="key-list">
                                    ${n.detail.keyPoints.map(p => `<li>${p}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 상세 보기 토글
        function toggleDetail(card) {
            const detail = card.querySelector('.card-detail');
            const isOpen = detail.classList.contains('open');
            
            // 다른 열린 카드 닫기
            document.querySelectorAll('.card-detail.open').forEach(d => d.classList.remove('open'));
            
            if (!isOpen) {
                detail.classList.add('open');
            }
        }

        // 필터링
        function filterRankings(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(category === 'all' ? '전체' : category === 'economy' ? '금융' : category === 'policy' ? '정책' : '기술')) {
                    btn.classList.add('active');
                }
            });
            renderRankings(category);
        }

        // 차트 초기화
        function initChart() {
            const ctx = document.getElementById('wealthChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: newsData.map(n => `${n.rank}위`),
                    datasets: [{
                        label: 'Market Impact Score',
                        data: newsData.map(n => n.score),
                        backgroundColor: 'rgba(197, 160, 89, 0.6)',
                        borderColor: '#c5a059',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#a0a0a0' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#a0a0a0' }
                        }
                    }
                }
            });
        }

        // 초기화 실행
        window.onload = () => {
            setDate();
            buildTicker();
            renderRankings();
            initChart();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wealth Report — Minimalist Luxury</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-main: #0c0c0c;
            --bg-card: #1a1a1a;
            --text-light: #e0e0e0;
            --text-dark: #a0a0a0;
            --accent-gold: #b8860b; /* Darker gold for subtle luxury */
            --border-subtle: rgba(255, 255, 255, 0.08);
            --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.6);
            --transition-ease: all 0.3s ease-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: 'Roboto', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
            font-size: 16px;
        }

        /* Global Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 25px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 80px 0 50px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 50px;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 4.2rem;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: -0.03em;
            margin-bottom: 10px;
        }

        .header-subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .header-date {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 300;
        }

        /* Ticker */
        .ticker-wrapper {
            background-color: var(--bg-card);
            padding: 12px 0;
            overflow: hidden;
            border-bottom: 1px solid var(--border-subtle);
        }

        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: tickerAnimation 35s linear infinite;
        }

        @keyframes tickerAnimation {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            padding: 0 30px;
            font-size: 0.85rem;
            color: var(--text-dark);
            flex-shrink: 0;
        }

        .ticker-item strong {
            color: var(--accent-gold);
            margin-right: 8px;
        }

        /* Filter Navigation */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px 0;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 50px;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            padding-bottom: 8px;
            position: relative;
            transition: var(--transition-ease);
        }

        .filter-btn::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background-color: var(--accent-gold);
            transform: scaleX(0);
            transition: transform 0.3s ease-out;
        }

        .filter-btn:hover::after, .filter-btn.active::after {
            transform: scaleX(1);
        }

        .filter-btn.active {
            color: var(--accent-gold);
        }

        /* Ranking Cards */
        .ranking-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .rank-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 40px;
            display: flex;
            align-items: flex-start;
            gap: 30px;
            transition: var(--transition-ease);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .rank-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(184, 134, 11, 0.05) 0%, transparent 30%);
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }

        .rank-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-deep);
            border-color: var(--accent-gold);
        }

        .rank-card:hover::before {
            opacity: 1;
        }

        .rank-number {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-gold);
            line-height: 1;
            flex-shrink: 0;
            width: 70px;
            text-align: center;
        }

        .card-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            color: var(--text-light);
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .card-summary {
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .impact-score {
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--accent-gold);
            text-align: right;
            flex-shrink: 0;
            width: 100px;
        }

        .impact-score span {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 5px;
        }

        /* Detail Section */
        .card-detail {
            grid-column: 1 / -1;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s ease-out;
            background-color: rgba(0, 0, 0, 0.2);
            margin-top: 20px;
            padding: 0 40px;
        }

        .card-detail.open {
            max-height: 600px; /* Adjust as needed */
            padding: 30px 40px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .detail-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 15px;
        }

        .detail-section p, .detail-section li {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .key-points-list {
            list-style: none;
        }

        .key-points-list li::before {
            content: '•';
            color: var(--accent-gold);
            margin-right: 10px;
        }

        /* Chart Section */
        .chart-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 50px;
            margin-top: 80px;
        }

        .chart-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .chart-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .chart-header p {
            font-size: 1rem;
            color: var(--text-dark);
        }

        .chart-container {
            height: 400px;
            position: relative;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 25px;
            color: var(--text-dark);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 80px;
        }

        .footer-text {
            margin-top: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-logo { font-size: 3rem; }
            .rank-card { flex-direction: column; align-items: center; text-align: center; padding: 30px; }
            .rank-number { margin-bottom: 20px; }
            .impact-score { text-align: center; margin-top: 20px; }
            .detail-grid { grid-template-columns: 1fr; }
            .card-detail.open { padding: 20px 30px; }
            .chart-section { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="ticker-content" id="ticker">
            <!-- Ticker items will be injected -->
        </div>
    </div>

    <header class="container">
        <div class="header-logo">The Wealth Report</div>
        <p class="header-subtitle">Exclusive Insights for the Discerning Investor</p>
        <div class="header-date" id="today-date"></div>
    </header>

    <nav class="filter-nav container">
        <button class="filter-btn active" onclick="filterRankings('all')">All Reports</button>
        <button class="filter-btn" onclick="filterRankings('economy')">Financial Markets</button>
        <button class="filter-btn" onclick="filterRankings('policy')">Policy & Regulation</button>
        <button class="filter-btn" onclick="filterRankings('tech')">Future Tech</button>
    </nav>

    <main class="container">
        <div class="ranking-grid" id="ranking-list">
            <!-- Ranking cards will be injected -->
        </div>

        <section class="chart-section">
            <div class="chart-header">
                <h3>Market Sentiment Analysis</h3>
                <p>Key economic indicators and issue interest analysis.</p>
            </div>
            <div class="chart-container">
                <canvas id="wealthChart"></canvas>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-logo">The Wealth Report</div>
        <p>&#169; 2026 Premium Financial Insight. All rights reserved.</p>
        <p class="footer-text">Data automatically updated daily at midnight.</p>
    </footer>

    <script>
        const newsData = [
            {
                rank: 1,
                category: "economy",
                categoryLabel: "Financial Markets",
                title: "KOSPI Hits All-Time High — AI Investment Boom Drives to 6750",
                summary: "Global big tech companies' increased AI infrastructure spending propels KOSPI to an all-time high during intraday trading. Foreign and institutional buying is concentrated on Samsung Electronics and SK Hynix, shifting market capital towards IT growth stocks.",
                score: 98,
                detail: {
                    background: "Strong earnings from US big tech and sustained AI investment commitment are boosting Asian stock markets. The Korean market, a crucial part of the semiconductor supply chain, is undergoing a re-evaluation.",
                    keyPoints: [
                        "KOSPI breaks 6750, setting a new intraday record",
                        "Inflow of foreign and institutional net buying",
                        "AI semiconductor value chain stocks see sharp gains",
                        "Rising oil prices and delayed interest rate cuts remain potential risks"
                    ]
                }
            },
            {
                rank: 2,
                category: "policy",
                categoryLabel: "Policy & Regulation",
                title: "US FOMC Freezes Rates — Korean Financial Authorities Monitor FX Volatility",
                summary: "As the US Federal Reserve maintains its high-interest rate stance by freezing the benchmark rate at 3.75%, the USD/KRW exchange rate is threatening the 1,480 won level. The government convened a meeting of economic and financial leaders to discuss market stabilization measures.",
                score: 94,
                detail: {
                    background: "Expectations for US interest rate cuts have receded, raising concerns about capital outflow due to the interest rate differential between Korea and the US. The Ministry of Economy and Finance and the Bank of Korea are reviewing available tools to respond to exchange rate volatility.",
                    keyPoints: [
                        "US benchmark interest rate frozen at 3.75%",
                        "USD/KRW exchange rate forecast to be between 1,480 and 1,490 won",
                        "Macroeconomic and Financial Meeting convened by economic and financial leaders",
                        "Measures being prepared to prevent deterioration of export companies' profitability"
                    ]
                }
            },
            {
                rank: 3,
                category: "economy",
                categoryLabel: "Financial Services",
                title: "Competition Heats Up in Lifestyle Financial Platforms — KB, Shinhan Launch 'Super Apps'",
                summary: "Traditional financial institutions are intensifying their 'super app' strategies, integrating payment, investment, and lifestyle services to compete with big tech. Personalized asset management services based on consumer data analysis are emerging as a new revenue model for the financial sector.",
                score: 89,
                detail: {
                    background: "The creation of financial platform ecosystems that encompass banking, shopping, travel, and healthcare is accelerating. How precisely customer data is utilized will be key to future competitiveness.",
                    keyPoints: [
                        "KB Kookmin Bank, Shinhan Bank, etc., competing to advance super apps",
                        "Strengthening AI-based Wealth Management",
                        "May Family Month promotions based on consumer data",
                        "Differentiating MyData services by linking non-financial data"
                    ]
                }
            },
            {
                rank: 4,
                category: "policy",
                categoryLabel: "Policy & Regulation",
                title: "Prolonged Trump Tariff Risk — Global Supply Chain 'Energy-Food' Security Alert",
                summary: "Despite the US Supreme Court's ruling invalidating some tariffs, the Trump administration's protectionist stance is strengthening, expected to slow global trade growth. The restructuring of energy and food supply chains has emerged as a critical variable for the economy.",
                score: 85,
                detail: {
                    background: "Continued tariff pressure using Section 301 of the Trade Act is increasing uncertainty for Korean export companies. For Korea's import-dependent economy, rising oil prices are a major cause of inflationary pressure.",
                    keyPoints: [
                        "UN lowers global trade growth forecast to 2.2%",
                        "'Cold War'-like confrontation forming in energy and food supply chains",
                        "Increased cost burden on domestic refining and chemical industries",
                        "Strengthening government-level resource diplomacy for supply chain diversification"
                    ]
                }
            },
            {
                rank: 5,
                category: "tech",
                categoryLabel: "Future Tech",
                title: "Stanford AI Index 2026 — Korea's AI Model Competitiveness Ranks High Globally",
                summary: "The number of AI models developed by Korea has been confirmed to be 8, more than initially expected, proving its technological competitiveness. However, concerns about job displacement due to technological advancement and AI security issues are emerging as new social challenges.",
                score: 81,
                detail: {
                    background: "As seen at the 2026 World IT Show, AI has moved beyond laboratories to become a core infrastructure in industrial sites. This is a time when investment in security platforms and AI ethics must go hand in hand.",
                    keyPoints: [
                        "8 Korean AI models listed (Stanford report)",
                        "AI security platform 'SecureAI' etc. tech security demand surge",
                        "Paradoxical coexistence of workforce restructuring and increased AI investment",
                        "Acceleration of AI embedded infrastructure transition in education and medical fields"
                    ]
                }
            }
        ];

        function setDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US', options);
        }

        function buildTicker() {
            const ticker = document.getElementById('ticker');
            const items = newsData.map(n => `<div class="ticker-item"><strong>${n.rank}</strong> ${n.title}</div>`);
            ticker.innerHTML = items.join('') + items.join('');
        }

        function renderRankings(filter = 'all') {
            const list = document.getElementById('ranking-list');
            const filtered = filter === 'all' ? newsData : newsData.filter(n => n.category === filter);
            
            list.innerHTML = filtered.map((n, index) => `
                <div class="rank-card" onclick="toggleDetail(this)">
                    <div class="rank-number">${n.rank}</div>
                    <div class="card-content">
                        <div class="card-meta">${n.categoryLabel} &bull; April 30, 2026</div>
                        <h2>${n.title}</h2>
                        <p class="card-summary">${n.summary}</p>
                    </div>
                    <div class="impact-score">${n.score}<span>Impact Score</span></div>
                    <div class="card-detail">
                        <div class="detail-grid">
                            <div class="detail-section">
                                <h4>Background Insight</h4>
                                <p>${n.detail.background}</p>
                            </div>
                            <div class="detail-section">
                                <h4>Key Takeaways</h4>
                                <ul class="key-points-list">
                                    ${n.detail.keyPoints.map(p => `<li>${p}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleDetail(card) {
            const detail = card.querySelector('.card-detail');
            const isOpen = detail.classList.contains('open');
            
            document.querySelectorAll('.card-detail.open').forEach(d => d.classList.remove('open'));
            
            if (!isOpen) {
                detail.classList.add('open');
            }
        }

        function filterRankings(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderRankings(category);
        }

        function initChart() {
            const ctx = document.getElementById('wealthChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: newsData.map(n => `Rank ${n.rank}`),
                    datasets: [{
                        label: 'Impact Score',
                        data: newsData.map(n => n.score),
                        backgroundColor: 'rgba(184, 134, 11, 0.7)',
                        borderColor: '#b8860b',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: 'rgba(255, 255, 255, 0.08)' },
                            ticks: { color: 'var(--text-dark)' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: 'var(--text-dark)' }
                        }
                    }
                }
            });
        }

        window.onload = () => {
            setDate();
            buildTicker();
            renderRankings();
            initChart();
        };
    </script>
</body>
</html>
